name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Test
        run: npm test
      - name: Review documentation placement
        run: python3 scripts/review_placement.py
      - name: Scan added lines for private data
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base="${{ github.event.pull_request.base.sha }}"
          else
            base="${{ github.event.before }}"
            if [[ -z "$base" || "$base" =~ ^0+$ ]]; then
              base="HEAD^"
            fi
          fi
          python3 scripts/check-public-safety.py --git-range "$base...HEAD"
